function f32(b){const s=atob(b),u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return new Float32Array(u.buffer);}
function u32(b){const s=atob(b),u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return new Uint32Array(u.buffer);}

const canvas=document.getElementById('hc');
canvas.width=680;canvas.height=430;

const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(680,430);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1c1c22);

const camera=new THREE.PerspectiveCamera(36,680/430,0.01,100);
camera.position.set(0,0.05,3.8);
camera.lookAt(0,0.05,0);

scene.add(new THREE.AmbientLight(0xfff8f0,0.8));
const key=new THREE.DirectionalLight(0xfff5e8,2.4);
key.position.set(1.8,2.8,3.5);key.castShadow=true;
key.shadow.mapSize.set(1024,1024);key.shadow.radius=5;
scene.add(key);
const fill=new THREE.DirectionalLight(0xdde8ff,1.0);
fill.position.set(-2.5,0.5,2.5);scene.add(fill);
const rim=new THREE.DirectionalLight(0xffffff,0.5);
rim.position.set(0,1.5,-3);scene.add(rim);
const bot=new THREE.DirectionalLight(0xffe8d8,0.3);
bot.position.set(0,-2,1);scene.add(bot);

const headGroup=new THREE.Group();
scene.add(headGroup);

const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(f32(P),3));
geo.setAttribute('normal',new THREE.BufferAttribute(f32(N),3));
geo.setIndex(new THREE.BufferAttribute(u32(I),1));

const mat=new THREE.MeshStandardMaterial({
  color:new THREE.Color(0xc49a6c),
  roughness:0.70,metalness:0.02,
  side:THREE.FrontSide,
});

const mesh=new THREE.Mesh(geo,mat);
mesh.castShadow=true;
geo.computeBoundingBox();
const box=geo.boundingBox;
mesh.position.y=-(box.max.y+box.min.y)/2;
headGroup.add(mesh);

const presets=[
  {name:"Front",         ry:0,          rx:0},
  {name:"Left 30°",      ry:Math.PI/6,  rx:0},
  {name:"Right 30°",     ry:-Math.PI/6, rx:0},
  {name:"Tilt up 20°",   ry:0,          rx:-Math.PI/9},
  {name:"Tilt down 20°", ry:0,          rx:Math.PI/9},
];
let curP=0,tRY=0,tRX=0,cRY=0,cRX=0,anim=false,cycle=null;

function goTo(i){
  curP=i;tRY=presets[i].ry;tRX=presets[i].rx;anim=true;
  document.querySelectorAll('.pb').forEach((b,j)=>{
    const s=j===i;
    b.style.background=s?'rgba(99,179,237,0.15)':'transparent';
    b.style.color=s?'#63b3ed':'var(--color-text-primary)';
    b.style.borderColor=s?'#63b3ed':'rgba(128,128,128,0.35)';
  });
  document.getElementById('lbl').textContent=presets[i].name;
}

const btnsEl=document.getElementById('btns');
presets.forEach((p,i)=>{
  const b=document.createElement('button');
  b.className='pb';b.textContent=p.name;
  b.style.cssText='padding:6px 18px;border-radius:8px;border:0.5px solid rgba(128,128,128,0.35);background:transparent;cursor:pointer;font-size:13px;font-family:inherit;color:var(--color-text-primary);transition:all 0.15s;';
  b.onclick=()=>{clearInterval(cycle);cycle=null;goTo(i);};
  btnsEl.appendChild(b);
});
goTo(0);

let ci=0;
cycle=setInterval(()=>{ci=(ci+1)%presets.length;goTo(ci);},2500);

(function animate(){
  requestAnimationFrame(animate);
  if(anim){
    cRY+=(tRY-cRY)*0.065;cRX+=(tRX-cRX)*0.065;
    if(Math.abs(cRY-tRY)<3e-4&&Math.abs(cRX-tRX)<3e-4){cRY=tRY;cRX=tRX;anim=false;}
  }
  headGroup.rotation.y=cRY;headGroup.rotation.x=cRX;
  renderer.render(scene,camera);
})();
})();
</script>
