<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identity Liveness Check</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes scanline {
      0%, 100% { top: 5%; opacity: 0; }
      10%, 90% { opacity: 1; }
      50% { top: 95%; }
    }
    .animate-scanline {
      animation: scanline 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    
    /* Preserve 3D for the mesh container */
    .preserve-3d {
      transform-style: preserve-3d;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 flex flex-col items-center justify-center p-4 font-sans">

  <div class="w-full max-w-md bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200 p-8">
    
    <!-- Hidden Canvas for Video Processing -->
    <canvas id="hidden-canvas" width="80" height="60" class="hidden"></canvas>

    <!-- SUCCESS VIEW (Hidden by default) -->
    <div id="success-view" class="hidden flex-col items-center justify-center h-[420px] text-center space-y-6">
      <div class="relative">
        <div class="absolute inset-0 bg-emerald-500 rounded-full animate-ping opacity-20"></div>
        <div class="bg-gradient-to-tr from-emerald-500 to-emerald-400 rounded-full p-6 relative z-10 shadow-[0_0_40px_rgba(16,185,129,0.4)]">
          <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            <path d="m9 12 2 2 4-4"></path>
          </svg>
        </div>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Identity Verified</h2>
        <p class="text-slate-500 text-sm">All biometric liveness checks passed securely.</p>
      </div>
      <button id="btn-restart" class="mt-6 flex items-center gap-2 px-8 py-3 bg-slate-900 text-white rounded-xl font-medium hover:bg-slate-800 transition-all active:scale-95">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Finish & Restart
      </button>
    </div>

    <!-- SCANNER VIEW -->
    <div id="scanner-view" class="flex flex-col items-center">
      
      <!-- Header & Steps Indicator -->
      <div class="w-full text-center mb-8">
        <div id="step-dots" class="flex justify-center gap-2 mb-5">
          <!-- Dots injected via JS -->
        </div>
        <div class="text-xs font-semibold tracking-widest text-indigo-500 uppercase mb-2">
          Step <span id="current-step-num">1</span> of 5
        </div>
        <h2 id="step-title" class="text-2xl font-bold mb-1 transition-opacity duration-300">Look straight ahead</h2>
        <p id="step-desc" class="text-sm text-slate-500 min-h-[20px]">Position your face inside the frame</p>
      </div>

      <!-- Main Scanner UI -->
      <div class="relative w-[280px] h-[280px] mb-8">
        
        <!-- Progress Ring -->
        <svg class="absolute inset-0 w-full h-full -rotate-90 pointer-events-none drop-shadow-md" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="1.5" class="text-slate-100" />
          <circle id="progress-ring" cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="4"
            class="transition-all duration-300 ease-out text-indigo-500"
            stroke-dasharray="301.6" stroke-dashoffset="301.6" stroke-linecap="round" />
        </svg>

        <!-- Central Masked Area -->
        <div id="scanner-mask" class="absolute inset-[8px] rounded-full overflow-hidden bg-slate-100 shadow-inner transition-all duration-300 ring-0 ring-emerald-500/30">
          
          <!-- Fallback Background -->
          <div class="absolute inset-0 bg-gradient-to-b from-indigo-50/50 to-slate-100"></div>

          <!-- Video Feed -->
          <video id="video-feed" autoplay playsinline muted class="hidden w-full h-full object-cover transform -scale-x-100 relative z-10"></video>
          
          <!-- Overlay for Video -->
          <div id="video-overlay" class="hidden absolute inset-0 bg-indigo-900/10 mix-blend-overlay z-20"></div>

          <!-- Ghosted Avatar Guide Overlay -->
          <div id="mesh-container" class="absolute inset-6 text-indigo-400 transition-all duration-700 ease-out preserve-3d z-30" style="transform: perspective(600px) rotateX(0deg) rotateY(0deg);">
            <svg viewBox="0 0 200 240" class="w-full h-full drop-shadow-[0_0_12px_currentColor]">
              <defs>
                <linearGradient id="meshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="currentColor" stop-opacity="0.9" />
                  <stop offset="100%" stop-color="currentColor" stop-opacity="0.3" />
                </linearGradient>
              </defs>
              <g fill="none" stroke="url(#meshGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M100 15 C65 15 40 50 40 95 C40 130 50 150 65 175 C70 185 75 195 70 205 C60 225 40 230 20 230 L180 230 C160 230 140 225 130 205 C125 195 130 185 135 175 C150 150 160 130 160 95 C160 50 135 15 100 15 Z" />
                <path d="M100 15 L100 230" stroke-dasharray="4 6" stroke-width="1.5" class="opacity-50" />
                <path d="M40 95 Q100 120 160 95" stroke-width="1.5" class="opacity-40" />
                <path d="M47 135 Q100 160 153 135" stroke-width="1.5" class="opacity-40" />
                <path d="M65 175 Q100 195 135 175" stroke-width="1.5" class="opacity-40" />
                <circle cx="100" cy="95" r="4" fill="currentColor" />
                <circle cx="65" cy="90" r="5" fill="currentColor" class="opacity-80" />
                <circle cx="135" cy="90" r="5" fill="currentColor" class="opacity-80" />
                <circle cx="100" cy="145" r="3" fill="currentColor" />
              </g>
            </svg>
          </div>

          <!-- Scanning Laser -->
          <div id="scanline" class="hidden absolute left-0 right-0 h-[3px] bg-indigo-400 shadow-[0_0_12px_3px_rgba(129,140,248,0.6)] animate-scanline pointer-events-none z-40"></div>
        </div>

        <!-- Directional Arrows -->
        <div id="dir-left" class="hidden absolute top-1/2 -left-6 -translate-y-1/2 z-50 text-indigo-500 bg-white rounded-full p-2.5 shadow-[0_0_15px_rgba(99,102,241,0.4)] border border-indigo-100 animate-pulse">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        </div>
        <div id="dir-right" class="hidden absolute top-1/2 -right-6 -translate-y-1/2 z-50 text-indigo-500 bg-white rounded-full p-2.5 shadow-[0_0_15px_rgba(99,102,241,0.4)] border border-indigo-100 animate-pulse">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </div>
        <div id="dir-up" class="hidden absolute -top-6 left-1/2 -translate-x-1/2 z-50 text-indigo-500 bg-white rounded-full p-2.5 shadow-[0_0_15px_rgba(99,102,241,0.4)] border border-indigo-100 animate-pulse">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
        </div>
        <div id="dir-down" class="hidden absolute -bottom-6 left-1/2 -translate-x-1/2 z-50 text-indigo-500 bg-white rounded-full p-2.5 shadow-[0_0_15px_rgba(99,102,241,0.4)] border border-indigo-100 animate-pulse">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
        </div>
      </div>

      <!-- Bottom Actions -->
      <div class="w-full space-y-4">
        <p id="camera-error" class="hidden text-xs text-red-500 text-center font-medium"></p>
        
        <div class="flex items-center justify-between gap-3">
          <button id="btn-camera" class="flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-xl text-sm font-medium transition-all bg-indigo-50 text-indigo-600 hover:bg-indigo-100 ring-1 ring-indigo-500/30">
            <svg id="icon-cam-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            <svg id="icon-cam-off" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 2 20 20"/><path d="M10.4 10.4a3 3 0 0 0 3.2 3.2M7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16M15 15l3.5 3.5M20.4 14.4A2 2 0 0 0 22 13V9a2 2 0 0 0-2-2h-3l-2.5-3h-5l-1.3 1.5"/></svg>
            <span id="text-camera">Enable Camera</span>
          </button>

          <button id="btn-skip" class="flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-xl text-sm font-medium bg-slate-900 text-white hover:bg-slate-800 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="text-skip">Skip Step</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- Detection Logic ---
    const getBrightness = (data, x1, x2, y1, y2, W = 80) => {
      let sum = 0, n = 0;
      for (let y = y1; y < y2; y++) {
        for (let x = x1; x < x2; x++) {
          const i = (y * W + x) * 4;
          if (i < data.length) {
            sum += (data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114);
            n++;
          }
        }
      }
      return n ? sum / n : 0;
    };

    const STEPS = [
      { id: 'front', title: 'Look straight ahead', desc: 'Position your face inside the frame', detect: () => true },
      { id: 'left', title: 'Turn head left', desc: 'Slowly rotate your head to the left', detect: (d) => getBrightness(d.data,55,80,10,50) > getBrightness(d.data,0,25,10,50) + 8 },
      { id: 'right', title: 'Turn head right', desc: 'Slowly rotate your head to the right', detect: (d) => getBrightness(d.data,0,25,10,50) > getBrightness(d.data,55,80,10,50) + 8 },
      { id: 'up', title: 'Tilt head up', desc: 'Gently raise your chin upwards', detect: (d) => getBrightness(d.data,20,60,0,20) > getBrightness(d.data,20,60,40,60) + 6 },
      { id: 'down', title: 'Tilt head down', desc: 'Gently lower your chin downwards', detect: (d) => getBrightness(d.data,20,60,40,60) > getBrightness(d.data,20,60,0,20) + 6 },
    ];

    // --- State & DOM Elements ---
    let currentStepIdx = 0;
    let progress = 0;
    let cameraActive = false;
    let camStream = null;
    let detectionInterval = null;

    const els = {
      video: document.getElementById('video-feed'),
      canvas: document.getElementById('hidden-canvas'),
      videoOverlay: document.getElementById('video-overlay'),
      meshContainer: document.getElementById('mesh-container'),
      scanline: document.getElementById('scanline'),
      progressRing: document.getElementById('progress-ring'),
      scannerMask: document.getElementById('scanner-mask'),
      stepDots: document.getElementById('step-dots'),
      stepNum: document.getElementById('current-step-num'),
      stepTitle: document.getElementById('step-title'),
      stepDesc: document.getElementById('step-desc'),
      btnCamera: document.getElementById('btn-camera'),
      textCamera: document.getElementById('text-camera'),
      iconCamOn: document.getElementById('icon-cam-on'),
      iconCamOff: document.getElementById('icon-cam-off'),
      btnSkip: document.getElementById('btn-skip'),
      textSkip: document.getElementById('text-skip'),
      cameraError: document.getElementById('camera-error'),
      successView: document.getElementById('success-view'),
      scannerView: document.getElementById('scanner-view'),
      btnRestart: document.getElementById('btn-restart'),
      dirs: {
        left: document.getElementById('dir-left'),
        right: document.getElementById('dir-right'),
        up: document.getElementById('dir-up'),
        down: document.getElementById('dir-down'),
      }
    };

    // --- Core Functions ---
    function updateProgress(val) {
      progress = Math.min(Math.max(val, 0), 100);
      const circumference = 301.6;
      els.progressRing.style.strokeDashoffset = circumference - (progress / 100) * circumference;
      
      if (progress >= 100) {
        els.progressRing.classList.replace('text-indigo-500', 'text-emerald-500');
        els.meshContainer.classList.replace('text-indigo-400', 'text-emerald-400');
        els.scannerMask.classList.replace('ring-0', 'ring-4');
        els.btnSkip.disabled = true;
        els.textSkip.innerText = 'Processing...';
        els.scanline.classList.add('hidden');
        hideArrows();
        
        setTimeout(handleStepComplete, 700); // Transition wait
      } else {
        els.progressRing.classList.replace('text-emerald-500', 'text-indigo-500');
        els.meshContainer.classList.replace('text-emerald-400', 'text-indigo-400');
        els.scannerMask.classList.replace('ring-4', 'ring-0');
        els.btnSkip.disabled = false;
        els.textSkip.innerText = 'Skip Step';
      }
    }

    function renderStep() {
      const step = STEPS[currentStepIdx];
      els.stepNum.innerText = currentStepIdx + 1;
      els.stepTitle.innerText = step.title;
      els.stepDesc.innerText = step.desc;

      // Update dots
      els.stepDots.innerHTML = STEPS.map((_, i) => `
        <div class="h-1.5 rounded-full transition-all duration-500 ${
          i === currentStepIdx ? 'w-8 bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.6)]' 
          : i < currentStepIdx ? 'w-2.5 bg-emerald-500' 
          : 'w-2.5 bg-slate-200'
        }"></div>
      `).join('');

      // Mesh 3D Rotation
      let rotX = 0, rotY = 0;
      if (step.id === 'left') rotY = -35;
      if (step.id === 'right') rotY = 35;
      if (step.id === 'up') rotX = 25;
      if (step.id === 'down') rotX = -25;
      els.meshContainer.style.transform = `perspective(600px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;

      // Arrows
      hideArrows();
      if (progress < 100 && step.id !== 'front') {
        els.dirs[step.id].classList.remove('hidden');
      }

      if (cameraActive) {
        els.meshContainer.classList.add('opacity-30', 'mix-blend-screen');
        if (progress < 100) els.scanline.classList.remove('hidden');
      } else {
        els.meshContainer.classList.remove('opacity-30', 'mix-blend-screen');
        els.scanline.classList.add('hidden');
      }
    }

    function hideArrows() {
      Object.values(els.dirs).forEach(el => el.classList.add('hidden'));
    }

    function handleStepComplete() {
      if (currentStepIdx < STEPS.length - 1) {
        currentStepIdx++;
        updateProgress(0);
        renderStep();
      } else {
        showSuccess();
      }
    }

    function showSuccess() {
      els.scannerView.classList.add('hidden');
      els.successView.classList.remove('hidden');
      els.successView.classList.add('flex');
    }

    function resetApp() {
      currentStepIdx = 0;
      els.successView.classList.add('hidden');
      els.successView.classList.remove('flex');
      els.scannerView.classList.remove('hidden');
      updateProgress(0);
      renderStep();
    }

    // --- Camera & Loop ---
    async function toggleCamera() {
      if (cameraActive) {
        // Stop
        if (camStream) {
          camStream.getTracks().forEach(t => t.stop());
          els.video.srcObject = null;
        }
        cameraActive = false;
        clearInterval(detectionInterval);
        
        // UI Updates
        els.video.classList.add('hidden');
        els.videoOverlay.classList.add('hidden');
        els.btnCamera.classList.replace('bg-slate-100', 'bg-indigo-50');
        els.btnCamera.classList.replace('text-slate-600', 'text-indigo-600');
        els.btnCamera.classList.add('ring-1', 'ring-indigo-500/30');
        els.iconCamOn.classList.remove('hidden');
        els.iconCamOff.classList.add('hidden');
        els.textCamera.innerText = 'Enable Camera';
        
      } else {
        // Start
        try {
          camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 320, height: 240 } });
          els.video.srcObject = camStream;
          cameraActive = true;
          els.cameraError.classList.add('hidden');
          
          // UI Updates
          els.video.classList.remove('hidden');
          els.videoOverlay.classList.remove('hidden');
          els.btnCamera.classList.replace('bg-indigo-50', 'bg-slate-100');
          els.btnCamera.classList.replace('text-indigo-600', 'text-slate-600');
          els.btnCamera.classList.remove('ring-1', 'ring-indigo-500/30');
          els.iconCamOn.classList.add('hidden');
          els.iconCamOff.classList.remove('hidden');
          els.textCamera.innerText = 'Turn Off';
          
          startDetectionLoop();
        } catch(e) {
          els.cameraError.innerText = 'Camera access denied. Use manual controls.';
          els.cameraError.classList.remove('hidden');
        }
      }
      renderStep();
    }

    function startDetectionLoop() {
      clearInterval(detectionInterval);
      detectionInterval = setInterval(() => {
        if (!cameraActive || currentStepIdx >= STEPS.length || progress >= 100) return;

        let detected = false;
        try {
          const ctx = els.canvas.getContext('2d', { willReadFrequently: true });
          ctx.drawImage(els.video, 0, 0, 80, 60);
          const imgData = ctx.getImageData(0, 0, 80, 60);
          detected = STEPS[currentStepIdx].detect(imgData);
        } catch (e) {}

        const increment = currentStepIdx === 0 ? 5 : 8;
        updateProgress(detected ? progress + increment : progress - 4);
      }, 150);
    }

    // --- Event Listeners ---
    els.btnCamera.addEventListener('click', toggleCamera);
    els.btnSkip.addEventListener('click', () => updateProgress(100));
    els.btnRestart.addEventListener('click', resetApp);

    // Initial render
    renderStep();
    updateProgress(0);

  </script>
</body>
</html>
